spring.application.name=golf-platform

# Server
server.port=8080

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:golf_platform
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Stripe API Keys (Dummy for testing)
stripe.api.key=sk_test_51MockStripeKey1234567890abcdefghijklmnopqrstuvwxyz

# JWT Secret (Move to env variables in production)
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:5173
